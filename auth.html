<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerbang Masuk - TKA Math Mastery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', sans-serif; background-color: #0f172a; color: white; display: flex; align-items: center; min-height: 100vh;}
    
    .auth-card { background: rgba(30, 41, 59, 0.9); backdrop-filter: blur(15px); border: 2px solid #334155; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; }
    
    /* Custom Tabs */
    .nav-pills .nav-link { color: #94a3b8; font-weight: bold; font-size: 1.1rem; border-radius: 0; padding: 15px; }
    .nav-pills .nav-link.active { background-color: transparent; color: #f59e0b; border-bottom: 4px solid #f59e0b; }
    
    /* Inputs */
    .form-control, .form-select { background-color: #0f172a; border: 2px solid #334155; color: white; border-radius: 15px; padding: 12px 15px; }
    .form-control:focus, .form-select:focus { background-color: #0f172a; color: white; border-color: #10b981; box-shadow: none; }
    .form-label { font-weight: bold; color: #cbd5e1; font-size: 0.9rem; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
    
    /* Button */
    .btn-auth { background: linear-gradient(45deg, #10b981, #059669); color: white; font-weight: 900; font-size: 1.2rem; padding: 15px; border-radius: 15px; border: none; transition: 0.3s; }
    .btn-auth:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(16, 185, 129, 0.4); }
  </style>
</head>
<body>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        
        <div class="text-center mb-4">
            <h1 class="fw-bold" style="color: #fcd34d;">Pintu Gerbang Akademi 🏰</h1>
            <p class="text-muted">Pilih jalanmu, siapkan senjatamu.</p>
        </div>

        <div class="auth-card">
          <ul class="nav nav-pills nav-justified" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
              <button class="nav-link active" id="tab-register" data-bs-toggle="pill" data-bs-target="#pills-register" type="button" role="tab">Buat Karakter (Pendaftaran)</button>
            </li>
            <li class="nav-item" role="presentation">
              <button class="nav-link" id="tab-login" data-bs-toggle="pill" data-bs-target="#pills-login" type="button" role="tab">Masuk Markas (Login)</button>
            </li>
          </ul>

          <div class="card-body p-4 p-md-5">
            <div class="tab-content" id="pills-tabContent">
              
              <!-- Form Register -->
              <div class="tab-pane fade show active" id="pills-register" role="tabpanel">
                <form id="registerForm">
                  <div class="mb-3">
                    <label class="form-label">Nama Pahlawan (Nama Lengkap)</label>
                    <input type="text" class="form-control" id="regName" placeholder="Cth: Satria Baja Hitam" required>
                  </div>
                  
                  <div class="row">
                      <div class="col-6 mb-3">
                        <label class="form-label">Class (Peran)</label>
                        <select class="form-select" id="regRole" required>
                          <option value="student">⚔️ Siswa</option>
                          <option value="parent">🛡️ Orang Tua</option>
                          <option value="teacher">🧙‍♂️ Guru</option>
                        </select>
                      </div>
                      <div class="col-6 mb-3" id="jenjangContainer">
                        <label class="form-label">Tingkat (Level)</label>
                        <select class="form-select" id="regJenjang">
                          <option value="SD">🎒 SD/MI</option>
                          <option value="SMP">📘 SMP/MTs</option>
                          <option value="Umum">🚫 Umum (Ortu/Guru)</option>
                        </select>
                      </div>
                  </div>

                  <div class="mb-3">
                    <label class="form-label">Surat Elektronik (Email)</label>
                    <input type="email" class="form-control" id="regEmail" placeholder="satria@email.com" required>
                  </div>
                  <div class="mb-4">
                    <label class="form-label">Kata Sandi Rahasia</label>
                    <input type="password" class="form-control" id="regPassword" placeholder="Minimal 6 karakter" minlength="6" required>
                  </div>
                  <button type="submit" class="btn btn-auth w-100" id="btnRegister">DAFTAR SEKARANG</button>
                </form>
              </div>

              <!-- Form Login -->
              <div class="tab-pane fade" id="pills-login" role="tabpanel">
                <form id="loginForm">
                  <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="loginEmail" required>
                  </div>
                  <div class="mb-4">
                    <label class="form-label">Kata Sandi</label>
                    <input type="password" class="form-control" id="loginPassword" required>
                  </div>
                  <button type="submit" class="btn btn-auth w-100" id="btnLogin">MASUK</button>
                </form>
              </div>

            </div>

            <div id="authMessage" class="mt-4 text-center fw-bold"></div>
          </div>
        </div>

        <div class="text-center mt-3">
            <a href="/index.html" class="text-muted text-decoration-none small">← Kabur kembali ke beranda</a>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module" src="/src/auth.js"></script>
</body>
</html>
